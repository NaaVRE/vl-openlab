name: Binder tests
on:
  pull_request:
    types: [opened, reopened]

jobs:
  binder:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v2

      - name: Build and test
        uses: jupyterhub/repo2docker-action@master
        with:
          NO_PUSH: true

      - name: Comment on PR with Binder link
        uses: actions/github-script@v1
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            var BRANCH_NAME = process.env.BRANCH_NAME;
            github.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `[![Binder](https://img.shields.io/badge/launch-naavre-3c8f49.svg?style=for-the-badge&logo=data:image/svg%2bxml;base64,)](https://naavre-dev.minikube.test/binderhub/v2/gh/${context.repo.owner}/${context.repo.repo}/${BRANCH_NAME}) Launch a NaaVRE lab on this branch`
            })
        env:
          BRANCH_NAME: ${{ github.event.pull_request.head.ref }}
